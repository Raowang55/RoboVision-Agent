# Model configuration for RoboVision-Agent
models:
  yolo:
    type: yolo
    description: "YOLO object detection model"
    model_path: ""  # placeholder for real model path
    confidence_threshold: 0.5
    nms_threshold: 0.45

  grounding_dino:
    type: grounding
    description: "Open-vocabulary object detection (Grounding DINO)"
    model_path: ""
    text_threshold: 0.25
    box_threshold: 0.35

  sam:
    type: segmentation
    description: "Segment Anything Model"
    model_type: "vit_h"
    model_path: ""

  dataset:
    type: analysis
    description: "Dataset analysis and statistics"
    supported_formats: ["coco", "yolo", "voc"]

deployment:
  onnx:
    opset_version: 17
    dynamic_axes: true
  tensorrt:
    fp16: true
    max_batch_size: 1
