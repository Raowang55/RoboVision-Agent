# Agent configuration for RoboVision-Agent
agent:
  name: "RoboVision Agent"
  description: "Multi-tool computer vision agent powered by LLM"
  max_tool_calls: 10

  tools:
    - name: detect
      tool: yolo_tool
      description: "Detect objects in an image using YOLO"
    - name: detect_open
      tool: grounding_tool
      description: "Open-vocabulary detection — find objects described by natural language"
    - name: segment
      tool: sam_tool
      description: "Segment objects in an image using SAM"
    - name: analyze
      tool: dataset_tool
      description: "Analyze and summarize dataset statistics"
    - name: report
      tool: report_tool
      description: "Generate visual reports with bounding boxes and masks"
    - name: deploy
      tool: deploy_tool
      description: "Export models to ONNX or TensorRT format"

ui:
  title: "RoboVision Agent"
  theme: "soft"
  max_image_size: [1024, 1024]
